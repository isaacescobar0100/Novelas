<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Frutinovelas Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,700;1,9..144,900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#14060e; --ink2:#2a0a1f;
    --cream:#fef6e4;
    --magenta:#e91e63;
    --gold:#f5b800;
    --orange:#ff6b35;
    --line:rgba(254,246,228,.22);
    --muted:rgba(254,246,228,.65);
    --faint:rgba(254,246,228,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'DM Sans',system-ui,sans-serif;
    color:var(--cream);
    background:radial-gradient(ellipse at top left,#2a0a1f 0%,#14060e 45%,#0a0408 100%) fixed;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .grain{position:fixed;inset:0;pointer-events:none;opacity:.08;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}
  .wrap{position:relative;max-width:1000px;margin:0 auto;padding:80px 18px 80px;}
  @media(min-width:700px){.wrap{padding:90px 32px 80px;}}
  .stamp{display:inline-block;padding:4px 10px;font-size:10px;letter-spacing:.25em;
    text-transform:uppercase;border:1px solid currentColor;transform:rotate(-2deg);
    margin-right:8px;}
  h1.title{font-family:'Fraunces',serif;font-style:italic;font-weight:900;
    font-variation-settings:"opsz" 144,"SOFT" 100,"WONK" 1;
    font-size:clamp(3rem,9vw,6.5rem);line-height:.85;letter-spacing:-.04em;
    margin:14px 0 0;color:var(--cream);}
  h1.title .pink{color:var(--magenta)}
  h1.title .gold{color:var(--gold);font-style:italic;display:block}
  .sub{margin:20px 0 0;max-width:520px;font-size:17px;font-style:italic;color:var(--muted)}
  .sub .pink{color:var(--magenta);font-style:normal}

  .context-bar{
    margin-top:24px;padding:14px 16px;
    background:rgba(245,184,0,.12);
    border:1px solid rgba(245,184,0,.4);
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  }
  .context-bar .label{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);font-weight:700;}
  .context-bar .name{font-family:'Fraunces',serif;font-style:italic;font-size:18px;color:var(--cream);flex:1;}
  .context-bar .ep{font-size:12px;color:var(--muted);}
  .context-bar button{background:transparent;border:1px solid rgba(245,184,0,.5);
    color:var(--gold);padding:6px 10px;font-size:10px;letter-spacing:.2em;
    text-transform:uppercase;cursor:pointer;font-family:inherit;font-weight:700;}

  .toast{position:fixed;bottom:20px;left:20px;right:20px;max-width:500px;margin:0 auto;
    padding:14px 18px;background:var(--ink2);border:1px solid var(--magenta);
    color:var(--cream);font-size:14px;z-index:60;box-shadow:0 10px 40px rgba(233,30,99,.4);}
  .toast .toast-title{font-weight:700;margin-bottom:4px;}
  .toast button{background:transparent;border:0;color:var(--gold);font-size:18px;
    position:absolute;top:8px;right:12px;cursor:pointer;}

  .panel{padding:22px;margin-top:36px;background:rgba(254,246,228,.04);
    border:1px solid var(--line);backdrop-filter:blur(8px);}
  @media(min-width:700px){.panel{padding:28px}}
  .panel h2{font-size:11px;letter-spacing:.3em;text-transform:uppercase;
    color:var(--faint);margin:0 0 18px;display:flex;align-items:center;gap:8px;}
  .panel-lbl{font-size:12px;color:var(--faint);margin:0 0 10px}
  .panel.locked{opacity:.55;pointer-events:none;}
  .locked-note{padding:12px;background:rgba(245,184,0,.1);border:1px dashed rgba(245,184,0,.4);color:var(--gold);font-size:13px;margin-bottom:18px;font-style:italic;pointer-events:auto;}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px}
  .chip{padding:9px 13px;font-size:14px;background:transparent;color:var(--muted);
    border:1px solid var(--line);cursor:pointer;font-family:inherit;transition:.15s;}
  .chip:hover{border-color:var(--cream)}
  .chip.on-pink{background:var(--magenta);color:var(--cream);border-color:var(--magenta);font-weight:700}
  .chip.on-gold{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:700}
  .chip.on-cream{background:var(--cream);color:var(--ink);border-color:var(--cream);font-weight:700}
  .chip.new-fruit{border-style:dashed;border-color:var(--gold);color:var(--gold);}
  .chip.new-fruit.on-new{background:var(--gold);color:var(--ink);border-style:solid;font-weight:700;}
  .chip.new-fruit .new-badge{display:inline-block;background:var(--ink);color:var(--gold);font-size:9px;padding:1px 5px;margin-left:6px;letter-spacing:.15em;font-weight:700;}
  .chip.new-fruit.on-new .new-badge{background:var(--cream);color:var(--ink);}

  .plan-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
  .plan-row .plan-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);font-weight:700;}
  .progress-dots{display:inline-flex;gap:4px;align-items:center;margin-left:6px;}
  .progress-dots .dot{width:8px;height:8px;border-radius:50%;background:rgba(254,246,228,.2);}
  .progress-dots .dot.done{background:var(--gold);}
  .progress-dots .dot.current{background:var(--magenta);box-shadow:0 0 8px var(--magenta);}

  .add-fruits-toggle{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;
    background:transparent;border:1px dashed var(--gold);color:var(--gold);
    font-family:inherit;font-size:12px;letter-spacing:.15em;text-transform:uppercase;
    cursor:pointer;margin-bottom:14px;font-weight:700;}
  .add-fruits-toggle:hover{background:rgba(245,184,0,.1);}
  .add-fruits-toggle.open{background:rgba(245,184,0,.15);}

  .beat-info{padding:10px 12px;background:rgba(233,30,99,.1);border-left:3px solid var(--magenta);
    color:var(--cream);font-size:13px;margin-bottom:14px;font-style:italic;}
  .beat-info strong{color:var(--magenta);font-style:normal;letter-spacing:.1em;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:14px 26px;font-size:13px;letter-spacing:.2em;text-transform:uppercase;
    font-weight:700;cursor:pointer;border:0;font-family:inherit;transition:.15s;}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-pink{background:var(--magenta);color:var(--cream)}
  .btn-gold{background:var(--gold);color:var(--ink)}
  .btn-orange{background:var(--orange);color:var(--ink)}
  .btn-ghost{background:transparent;color:var(--cream);border:1px solid var(--line)}
  .btn-saga{background:#7a1a52;color:var(--cream);}

  .tabs{position:sticky;top:0;z-index:3;display:flex;flex-wrap:wrap;gap:2px;
    padding:14px 0;margin:30px -18px 24px;padding-left:18px;padding-right:18px;
    background:linear-gradient(to bottom,#14060e 70%,transparent 100%);}
  @media(min-width:700px){.tabs{margin-left:0;margin-right:0;padding-left:0;padding-right:0;}}
  .tab{display:flex;align-items:center;gap:8px;padding:9px 12px;font-size:12px;
    letter-spacing:.18em;text-transform:uppercase;color:var(--faint);cursor:pointer;
    background:transparent;border:0;border-bottom:2px solid transparent;font-family:inherit;}
  .tab.active{color:var(--gold);border-color:var(--gold);font-weight:700}
  .tab .dot{width:6px;height:6px;border-radius:50%;background:var(--magenta);}

  h3.panel-title{font-family:'Fraunces',serif;font-style:italic;font-weight:700;
    font-size:clamp(2rem,5vw,3rem);line-height:1;letter-spacing:-.02em;
    margin:0 0 18px;color:var(--cream)}
  .panel-sub{font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--faint);margin-top:-12px;margin-bottom:18px}

  .out{padding:24px;white-space:pre-wrap;font-size:15px;line-height:1.65;
    background:var(--cream);color:var(--ink);box-shadow:0 20px 60px -20px rgba(233,30,99,.3);}
  .out.pink{border-left:4px solid var(--magenta)}
  .out.gold{border-left:4px solid var(--gold)}
  .out.orange{border-left:4px solid var(--orange)}
  .out.hook{
    background:linear-gradient(135deg,#fef6e4 0%,#fff8dc 100%);
    border-left:6px solid var(--magenta);
    border-right:6px solid var(--gold);
    font-size:16px;
    box-shadow:0 30px 80px -20px rgba(233,30,99,.5);
    position:relative;
  }
  .out.hook::before{
    content:'🎣 HOOK VIRAL';
    position:absolute;top:-12px;left:20px;
    background:var(--magenta);color:var(--cream);
    padding:4px 12px;font-size:10px;letter-spacing:.3em;font-weight:700;
  }

  .empty{padding:42px 22px;text-align:center;color:var(--faint);font-style:italic;
    border:1px dashed var(--line);}

  .row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px}

  .copy{display:inline-flex;align-items:center;gap:6px;font-size:11px;
    letter-spacing:.2em;text-transform:uppercase;padding:7px 12px;
    background:transparent;color:inherit;border:1px solid currentColor;
    cursor:pointer;font-family:inherit;opacity:.8;}
  .copy:hover{opacity:1}

  .spin{display:inline-block;width:14px;height:14px;border:2px solid currentColor;
    border-right-color:transparent;border-radius:50%;animation:s 1s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}

  .top-bar{position:fixed;top:14px;left:14px;right:14px;z-index:4;display:flex;justify-content:space-between;gap:8px;}
  .top-btn{background:rgba(254,246,228,.08);
    border:1px solid var(--line);color:var(--muted);padding:8px 12px;font-size:11px;
    letter-spacing:.15em;text-transform:uppercase;cursor:pointer;font-family:inherit;
    backdrop-filter:blur(8px);font-weight:700;}
  .top-btn:hover{color:var(--cream)}
  .top-btn .badge{display:inline-block;background:var(--magenta);color:var(--cream);
    padding:1px 6px;margin-left:6px;font-size:10px;}

  .modal-bg{position:fixed;inset:0;background:rgba(10,4,8,.85);backdrop-filter:blur(12px);
    display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal{max-width:560px;width:100%;background:var(--ink2);border:1px solid var(--line);padding:28px;max-height:90vh;overflow-y:auto;position:relative;}
  .modal h2{font-family:'Fraunces',serif;font-style:italic;font-size:28px;margin:0 0 14px;color:var(--gold);font-weight:700}
  .modal p{color:var(--muted);font-size:14px;line-height:1.55;margin:0 0 14px}
  .modal a{color:var(--magenta);text-decoration:underline}
  .modal input{width:100%;padding:12px 14px;background:var(--ink);border:1px solid var(--line);
    color:var(--cream);font-family:'DM Mono',monospace;font-size:13px;margin-bottom:14px;}
  .modal input:focus{outline:1px solid var(--magenta);border-color:var(--magenta)}
  .modal .warn{font-size:12px;color:var(--faint);font-style:italic;margin-top:10px}
  .modal ol{color:var(--muted);font-size:13px;padding-left:20px;line-height:1.7}
  .modal-close{position:absolute;top:18px;right:18px;background:transparent;border:0;color:var(--cream);font-size:24px;cursor:pointer;}

  .free-badge{display:inline-block;padding:3px 8px;background:var(--gold);color:var(--ink);font-size:10px;letter-spacing:.2em;font-weight:700;margin-bottom:12px;}

  .saga-item{padding:14px;background:rgba(254,246,228,.04);border:1px solid var(--line);margin-bottom:10px;}
  .saga-item .saga-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;}
  .saga-item .saga-title{font-family:'Fraunces',serif;font-style:italic;font-size:18px;color:var(--cream);font-weight:700;}
  .saga-item .saga-meta{font-size:11px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
  .saga-item .saga-del{background:transparent;border:1px solid rgba(255,107,53,.4);color:var(--orange);
    padding:4px 8px;font-size:10px;cursor:pointer;font-family:inherit;letter-spacing:.15em;text-transform:uppercase;}
  .ep-item{padding:8px 10px;background:rgba(254,246,228,.04);border-left:2px solid var(--magenta);
    margin-bottom:4px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .ep-item:hover{background:rgba(254,246,228,.1);}
  .ep-item.current{background:rgba(245,184,0,.15);border-left-color:var(--gold);}
  .ep-item .ep-num{font-weight:700;color:var(--gold);}
  .ep-item .ep-stat{font-size:10px;color:var(--faint);}
  .ep-add{margin-top:8px;background:transparent;border:1px dashed var(--line);color:var(--muted);
    padding:8px;width:100%;cursor:pointer;font-family:inherit;font-size:12px;letter-spacing:.15em;text-transform:uppercase;}
  .ep-add:hover{color:var(--cream);border-color:var(--cream);}

  .plan-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
  .plan-chip{padding:6px 10px;font-size:11px;background:transparent;color:var(--muted);
    border:1px solid var(--line);cursor:pointer;font-family:inherit;letter-spacing:.1em;text-transform:uppercase;}
  .plan-chip.on{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:700;}

  .progress{margin-top:8px;height:4px;background:rgba(254,246,228,.1);position:relative;overflow:hidden;}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--magenta),var(--gold));transition:width .4s;}
  .progress-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-top:6px;}

  .new-char-section{margin-top:18px;padding:14px;background:rgba(245,184,0,.08);border:1px dashed rgba(245,184,0,.4);}
  .new-char-section h3{margin:0 0 8px;font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);font-weight:700;}
  .new-char-section p{margin:0 0 10px;font-size:12px;color:var(--muted);}

  /* Sugerencias IA */
  .suggest-card{padding:18px;background:rgba(254,246,228,.04);border:1px solid var(--line);margin-bottom:12px;
    display:flex;gap:14px;align-items:flex-start;cursor:pointer;transition:.15s;}
  .suggest-card:hover{border-color:var(--gold);background:rgba(245,184,0,.05);}
  .suggest-card.checked{border-color:var(--magenta);background:rgba(233,30,99,.08);}
  .suggest-card .check{width:22px;height:22px;border:2px solid var(--line);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--cream);margin-top:2px;}
  .suggest-card.checked .check{background:var(--magenta);border-color:var(--magenta);}
  .suggest-card .body{flex:1;}
  .suggest-card .body h4{margin:0 0 6px;font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);font-weight:700;}
  .suggest-card .body .title{font-family:'Fraunces',serif;font-style:italic;font-size:18px;color:var(--cream);margin:0 0 8px;line-height:1.2;}
  .suggest-card .body .why{font-size:13px;color:var(--muted);margin:0 0 4px;}
  .suggest-card .body .why strong{color:var(--cream);}
  .analisis-box{padding:14px;background:rgba(245,184,0,.08);border-left:3px solid var(--gold);
    margin-bottom:18px;font-size:14px;color:var(--cream);font-style:italic;}

  footer{font-size:12px;color:var(--faint);padding-top:30px;margin-top:40px;
    border-top:1px solid var(--line);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  footer .it{font-style:italic}

  /* Master prompts con imagen */
  .master-card{padding:18px;background:rgba(254,246,228,.04);border:1px solid var(--line);margin-bottom:14px;}
  .master-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .master-card-num{font-family:'Fraunces',serif;font-style:italic;font-size:22px;color:var(--gold);font-weight:700;}
  .master-card-ok{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--magenta);
    background:rgba(233,30,99,.15);padding:4px 10px;border:1px solid var(--magenta);font-weight:700;}
  .master-card-body{display:flex;flex-direction:column;gap:12px;}
  .master-card-upload{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  .master-thumb{width:120px;height:120px;object-fit:cover;border:1px solid var(--line);background:var(--ink);}
  .master-thumb-empty{display:flex;align-items:center;justify-content:center;color:var(--faint);
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-style:italic;}
  .master-upload-btn{cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:14px 26px;font-size:13px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;
    font-family:inherit;background:transparent;color:var(--cream);border:1px solid var(--line);}
  .master-scene-context{font-size:12px;color:var(--muted);font-style:italic;line-height:1.5;
    padding:10px 12px;background:rgba(245,184,0,.06);border-left:2px solid var(--gold);
    max-height:80px;overflow:hidden;position:relative;}
  .master-out{padding:18px;background:linear-gradient(135deg,#fef6e4 0%,#fff8dc 100%);
    color:var(--ink);font-size:14px;line-height:1.6;white-space:pre-wrap;
    border-left:4px solid var(--gold);border-right:4px solid var(--magenta);
    box-shadow:0 20px 60px -20px rgba(245,184,0,.4);margin-top:6px;}
</style>
</head>
<body>
<div class="grain"></div>
<div id="app"></div>

<script type="module">
import { h, render } from 'https://esm.sh/preact@10.22.0';
import { useState, useEffect } from 'https://esm.sh/preact@10.22.0/hooks';
import htm from 'https://esm.sh/htm@3.1.1';
const html = htm.bind(h);

const FRUITS = ['🍓 Fresa','🥭 Mango','🍍 Piña','🍎 Manzana','🍐 Pera','🍉 Sandía','🍊 Naranja','🍋 Limón','🍌 Plátano','🍇 Uva','🥥 Coco','🥝 Kiwi','🥑 Aguacate','🍑 Cereza','🫐 Arándano','🍒 Guinda'];

const DRAMAS = [
  {id:'infidelidad', label:'Infidelidad',         icon:'💔'},
  {id:'venganza',    label:'Venganza',            icon:'🗡️'},
  {id:'secreto',     label:'Secreto familiar',    icon:'🤫'},
  {id:'amor',        label:'Amor prohibido',      icon:'💋'},
  {id:'herencia',    label:'Herencia perdida',    icon:'💰'},
  {id:'identidad',   label:'Identidad oculta',    icon:'🎭'},
  {id:'gemelo',      label:'Gemelo malvado',      icon:'👯'},
  {id:'embarazo',    label:'Embarazo sorpresa',   icon:'🤰'},
  {id:'traicion',    label:'Traición de amiga',   icon:'🥀'},
  {id:'amnesia',     label:'Amnesia trágica',     icon:'🌀'},
];

const TONES = [
  {id:'melodramatico', label:'Melodramático puro'},
  {id:'comico',        label:'Cómico exagerado'},
  {id:'trash',         label:'Trash TV ridículo'},
  {id:'oscuro',        label:'Oscuro y retorcido'},
];

const PLANS = [
  {id:'3',    label:'3 eps · Express',  emoji:'⚡'},
  {id:'5',    label:'5 eps · Saga corta', emoji:'🎬'},
  {id:'7',    label:'7 eps · Saga larga', emoji:'📺'},
  {id:'open', label:'Abierta · sin fin', emoji:'♾️'},
];

function getBeatDescription(n, total){
  if(!total || total === 'open') return null;
  const t = parseInt(total);
  if(isNaN(t)) return null;
  if(n === 1) return 'HOOK + SETUP: presenta personajes, plantea el conflicto central. Termina con un primer giro fuerte que enganche para el siguiente episodio.';
  if(n === t) return null; // finale uses separate prompt
  if(t === 3){
    if(n===2) return 'ESCALADA: todo se complica, una traición o revelación importante. Cliffhanger devastador para llevar al final.';
  }
  if(t === 5){
    if(n===2) return 'PRIMERA ESCALADA: complicación grave, una relación se rompe o un secreto se filtra parcialmente. Cliffhanger más fuerte que el anterior.';
    if(n===3) return 'PUNTO MEDIO / BOMBAZO: revelación que cambia la dirección de toda la historia. Lo que el espectador creía es falso.';
    if(n===4) return 'CRISIS MÁXIMA: los personajes tocan fondo, parece imposible salir. Cliffhanger "imposible salir de esta".';
  }
  if(t === 7){
    if(n===2) return 'PRIMERA COMPLICACIÓN: el conflicto crece, aparecen consecuencias inesperadas.';
    if(n===3) return 'SUBTRAMA: introduce un nuevo elemento o presión externa que complica todo más.';
    if(n===4) return 'PUNTO MEDIO: revelación que reorienta la historia. Cambio de juego total.';
    if(n===5) return 'CRISIS: consecuencias graves, traiciones, daños irreversibles parecen estar pasando.';
    if(n===6) return 'ÚLTIMA CAÍDA: oscuridad máxima antes del clímax. Todo parece perdido.';
  }
  return 'CONTINUACIÓN: avanza la trama, sube las apuestas emocionales, abre un nuevo cliffhanger.';
}

function getBeatLabel(n, total){
  if(!total || total === 'open') return null;
  const t = parseInt(total);
  if(isNaN(t)) return null;
  if(n === 1) return 'Hook+Setup';
  if(n === t) return 'FINAL';
  if(t === 3 && n === 2) return 'Escalada';
  if(t === 5){
    if(n===2) return 'Escalada';
    if(n===3) return 'Bombazo';
    if(n===4) return 'Crisis';
  }
  if(t === 7){
    if(n===2) return 'Complicación';
    if(n===3) return 'Subtrama';
    if(n===4) return 'Punto medio';
    if(n===5) return 'Crisis';
    if(n===6) return 'Última caída';
  }
  return 'Continuación';
}

// ────── GEMINI API con auto-fallback ──────
const MODELS = ['gemini-2.5-flash', 'gemini-2.5-flash-lite'];

async function callOneModel(apiKey, model, prompt, useWebSearch){
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`;
  const body = {
    contents: [{ parts: [{ text: prompt }] }],
    generationConfig: { temperature: 0.95, maxOutputTokens: 3500 },
  };
  if(useWebSearch){ body.tools = [{ googleSearch: {} }]; }
  const res = await fetch(url, {
    method:'POST',
    headers:{'Content-Type':'application/json','x-goog-api-key': apiKey},
    body: JSON.stringify(body),
  });
  if(!res.ok){
    const err = await res.text();
    const error = new Error('Gemini ' + res.status + ': ' + err.slice(0,250));
    error.status = res.status;
    error.transient = res.status === 503 || res.status === 429 || res.status === 500;
    throw error;
  }
  const data = await res.json();
  const parts = data?.candidates?.[0]?.content?.parts || [];
  return parts.map(p => p.text || '').join('\n').trim();
}

async function callGemini(apiKey, prompt, useWebSearch=false, onFallback){
  let lastErr;
  for(let i = 0; i < MODELS.length; i++){
    const model = MODELS[i];
    try {
      const r = await callOneModel(apiKey, model, prompt, useWebSearch);
      if(i > 0 && onFallback) onFallback(model);
      return r;
    } catch(e){
      lastErr = e;
      if(!e.transient) throw e;
      // Espera breve antes del siguiente modelo
      await new Promise(r => setTimeout(r, 1200));
    }
  }
  throw lastErr;
}

// ────── IMAGEN: redimensionar y convertir a base64 ──────
function fileToResizedInlineData(file, maxWidth = 1024){
  return new Promise((resolve, reject) => {
    if(!file || !file.type || !file.type.startsWith('image/')){
      reject(new Error('El archivo no es una imagen válida'));
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const w = Math.max(1, Math.round(img.width * scale));
        const h = Math.max(1, Math.round(img.height * scale));
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const mimeType = 'image/jpeg';
        const dataUrl = canvas.toDataURL(mimeType, 0.85);
        const base64 = dataUrl.split(',')[1];
        resolve({ mimeType, data: base64, dataUrl });
      };
      img.onerror = () => reject(new Error('No se pudo cargar la imagen'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
    reader.readAsDataURL(file);
  });
}

// ────── PARSEO DE ESCENAS ──────
function parseScenesList(scenesText, scriptText){
  // Prioridad 1: bloques de prompts de imagen (===ESCENA N===)
  if(scenesText){
    const matches = [...scenesText.matchAll(/===\s*ESCENA\s+(\d+)\s*===/gi)];
    if(matches.length > 0){
      return matches.map((m, i) => {
        const num = parseInt(m[1]);
        const start = m.index + m[0].length;
        const end = (i + 1 < matches.length) ? matches[i + 1].index : scenesText.length;
        const body = scenesText.slice(start, end).trim();
        return { n: num, body };
      });
    }
  }
  // Prioridad 2: parsear el guión (ESCENA N (...))
  if(scriptText){
    const matches = [...scriptText.matchAll(/ESCENA\s+(\d+)/gi)];
    if(matches.length > 0){
      return matches.map((m, i) => {
        const num = parseInt(m[1]);
        const start = m.index;
        const end = (i + 1 < matches.length) ? matches[i + 1].index : scriptText.length;
        const body = scriptText.slice(start, end).trim();
        return { n: num, body };
      });
    }
  }
  return [];
}

      return loaded.map(s => ({ ...s, plannedLength: s.plannedLength || 'open' }));
    }
    catch { return []; }
  });
  const [currentSagaId, setCurrentSagaId] = useState(null);

  // Imágenes subidas para masters (solo en memoria, no se persisten)
  const [masterImages, setMasterImages] = useState({}); // {sceneN: {inlineData, dataUrl}}

  useEffect(() => {
    localStorage.setItem('frutinovelas_sagas', JSON.stringify(sagas));
  }, [sagas]);

  // Cleanup + migración: añadir plannedLength y allFruits a sagas viejas, limpiar vacíos
  useEffect(() => {
    const migrated = sagas.map(s => ({
      ...s,
      plannedLength: s.plannedLength || s.planLength || 'open',
      allFruits: s.allFruits || [...s.fruits],
      episodes: s.episodes.filter(e => e.idea || e.hook || e.script || e.scenes || e.videos || e.publish).map(e => ({
        ...e,

        masters: e.masters || {},
      }))

    if(JSON.stringify(migrated) !== JSON.stringify(sagas)){
      setSagas(migrated);
    }
    // eslint-disable-next-line
  }, []);

  const currentSaga = sagas.find(s => s.id === currentSagaId);
  const currentEpisode = currentSaga?.episodes.find(e => e.id === currentEpisodeId);
  const isContinuing = currentSaga && currentEpisode && currentEpisode.number > 1;

  const activePlan = currentSaga?.plannedLength || draftPlan;
  const setActivePlan = (p) => {
    if(currentSaga){
      setSagas(prev => prev.map(s => s.id === currentSagaId ? {...s, plannedLength:p} : s));
    } else {
      setDraftPlan(p);
    }
  };

  // Limpiar nuevas frutas y forceFinale cuando cambia el contexto
  useEffect(() => {
    setNewFruits([]);
    setShowAddFruits(false);
    setForceFinale(false);
    setSuggestions(null);
    setAcceptedSugg({});
    setMasterImages({});

      setCurrentSagaId(null); setCurrentEpisodeId(null);
    }
  };

    setCurrentEpisodeId(episodeId);
    const saga = sagas.find(s=>s.id===sagaId);
    if(saga){
      setPickedFruits(saga.allFruits || saga.fruits);
      setDrama(saga.drama); setTone(saga.tone);
      if(saga.plannedLength) setDraftPlan(saga.plannedLength);
    }
    setNewFruits([]);
    setShowAddFruits(false);
    setForceFinale(false);
    setTab('idea');
    window.scrollTo(0,0);
  };

    setCurrentEpisodeId(null);
    setPickedFruits(saga.allFruits || saga.fruits);
    setDrama(saga.drama); setTone(saga.tone);
    if(saga.plannedLength) setDraftPlan(saga.plannedLength);
    setNewFruits([]);
    setShowAddFruits(false);
    setForceFinale(false);
    setTab('idea');
  };

  const updateEpisode = (sagaId, epId, fields) => {
    setSagas(prev => prev.map(s => {
      if(s.id !== sagaId) return s;
      return {...s, episodes: s.episodes.map(e => {
        if(e.id !== epId) return e;
        const updated = {...e, ...fields};
        if(fields.idea){
          const title = getSagaTitle(fields.idea);
          if(title) updated.title = title;
        }
        return updated;
      })};
    }));
  };

  // ─── Generation ───
  const runOrError = async (key, fn) => {
    setL(key,true);
    try { await fn(); }
    catch(e){
      const msg = e.transient
        ? 'Servidores de Gemini saturados. Espera 30s y reintenta.'
        : 'Error: '+e.message+'\n\nRevisa tu API key.';
      alert(msg);
    }
    setL(key,false);

            <div class="panel" style="margin-top:24px">
              <h2>🎵 Master cinematográfico con imagen</h2>
              <p style="color:var(--muted);font-size:14px;margin:0 0 8px;line-height:1.55">
                Sube la imagen real que ya generaste de cada escena (Midjourney, Flux, etc.). La IA analiza la imagen y crea un MASTER PROMPT con visual, cámara, diálogo en español, música, efectos de sonido, ambiente y transición — manteniendo coherencia entre escenas relacionadas.
              </p>
              <p style="font-size:11px;color:var(--faint);font-style:italic;margin:0 0 18px">⚠️ Las imágenes se guardan solo en memoria mientras tengas la página abierta. Los masters generados SÍ se guardan en localStorage.</p>

              ${scList.map(s => {
                const sn = s.n;
                const imgData = masterImages[sn];
                const masterText = epMasters[sn] || null;
                const isLoading = loading['master_' + sn];
                return html`
                  <div class="master-card">
                    <div class="master-card-head">
                      <span class="master-card-num">Escena ${sn}</span>
                      ${masterText && html`<span class="master-card-ok">✓ master listo</span>`}
                    </div>
                    ${s.body && html`<div class="master-scene-context">${s.body.slice(0,220)}${s.body.length>220?'…':''}</div>`}
                    <div class="master-card-body">
                      <div class="master-card-upload">
                        ${imgData
                          ? html`<img src=${imgData.dataUrl} class="master-thumb" alt=${"escena "+sn} />`
                          : html`<div class="master-thumb master-thumb-empty">Sin imagen</div>`}
                        <label class="master-upload-btn">
                          ${imgData ? '🖼 Cambiar imagen' : '📤 Subir imagen'}
                          <input type="file" accept="image/*" style="display:none" onChange=${(e)=>{handleImageUpload(sn, e.target.files[0]); e.target.value='';}} />
                        </label>
                      </div>
                      <button class="btn ${masterText?'btn-gold':'btn-orange'}" disabled=${!imgData || isLoading} onClick=${()=>genMaster(sn)}>
                        ${isLoading
                          ? html`<span class="spin"></span> Analizando imagen…`
                          : (masterText ? '🔄 Regenerar master de escena '+sn : '🎯 Generar master de escena '+sn)}
                      </button>
                      ${masterText && html`
                        <div style="position:relative">
                          <div class="master-out">${masterText}</div>
                          <div style="margin-top:8px;text-align:right"><${CopyBtn} text=${masterText} /></div>
                        </div>
                      `}
                    </div>
                  </div>
                `;
              })}

              ${scList.length > 1 && html`
                <button class="btn btn-saga" style="width:100%;margin-top:8px"
                  disabled=${!allImagesUploaded || someLoading}
                  onClick=${generateAllMastersInOrder}>
                  ${someLoading
                    ? html`<span class="spin"></span> Generando todos en orden…`
                    : (allImagesUploaded ? '⚡ Generar TODOS en orden (coherencia entre escenas)' : '⚡ Sube todas las imágenes para generar todos en orden')}
                </button>
              `}
            </div>
          `;
        })()}

        ${tab==='publish' && html`<${Panel}
          title="Publicar en redes"
          subtitle="Copy + hashtags optimizados para TikTok, Instagram, Facebook y YouTube Shorts"
          empty=${!publish}
          emptyMsg=${idea ? "Genera el copy completo con captions, hashtags y SEO para cada plataforma." : "Primero necesitas una idea o guión generado."}
          content=${publish}
          accent="pink"
          extra=${currentEpisode && html`<button class="btn btn-pink" onClick=${genPublish} disabled=${loading.publish}>${loading.publish?html`<span class="spin"></span> Generando copy multi-red…`:`📱 ${publish?'Regenerar copy':'Generar copy + hashtags'}`}</button>`}
          next=${publish && html`<div style="margin-top:20px"><button class="btn btn-pink" onClick=${genPublish} disabled=${loading.publish}>${loading.publish?html`<span class="spin"></span>`:'🔄'} Otra versión diferente</button></div>`}
        />`}

        ${tab==='trends' && html`<${Panel}
          title="Análisis viral en tiempo real"
          subtitle="Buscamos en Google ahora mismo"
          empty=${!trends}
          emptyMsg="Pulsa abajo para analizar qué frutinovelas están explotando esta semana."
          content=${trends}
          accent="pink"
          extra=${html`<button class="btn btn-pink" onClick=${genTrends} disabled=${loading.trends}>${loading.trends?html`<span class="spin"></span> Escaneando…`:`👁 ${trends?'Volver a analizar':'Analizar tendencias ahora'}`}</button>`}
        />`}

        ${currentSaga && currentEpisode && (idea || hook || script || scenes || videos || publish) && html`
          <div class="panel" style="margin-top:30px">
            <h2>📺 Continuar saga</h2>
            <p style="color:var(--muted);font-size:14px;margin:0 0 16px">
              Crea el siguiente episodio con el contexto completo de los anteriores. Misma serie, mismas frutas, drama que avanza.
            </p>
            <div style="display:flex;gap:10px;flex-wrap:wrap">
              <button class="btn btn-saga" onClick=${continueSaga}>📺 Generar Episodio ${currentSaga.episodes.length + 1} →</button>
              <button class="btn btn-ghost" onClick=${exportEpisode}>⬇ Exportar episodio (.txt)</button>
            </div>
          </div>
        `}
      </main>

      <footer>
        <span>Frutinovelas Studio v2.7 · Powered by Gemini</span>
        <span class="it">♥ ${sagas.length} sagas · ${totalEpisodes} episodios</span>
      </footer>
    </div>
  `;
}

render(h(App), document.getElementById('app'));
</script>
</body>
</html>
